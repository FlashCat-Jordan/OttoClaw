name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Verify no secrets in binary
        shell: bash
        run: |
          BIN="build/ottoclaw.bin"
          echo "Checking for embedded API keys..."
          ! strings "$BIN" | grep -qE 'sk-[a-f0-9]{20,}' || { echo "ERROR: Real API key found in firmware binary!"; exit 1; }
          ! strings "$BIN" | grep -qE 'ding[a-z0-9]{10,}' || { echo "ERROR: DingTalk key found in firmware binary!"; exit 1; }
          echo "Clean — no secrets detected."

      - name: Prepare release artifacts
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"

          # Generate merged firmware for single-command flashing
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode qio \
            --flash_size 16MB \
            --flash_freq 80m \
            -o "ottoclaw-full-${VERSION}.bin" \
            0x0     build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0xf000  build/ota_data_initial.bin \
            0x20000 build/ottoclaw.bin

          # Copy individual binaries with version suffix
          cp build/ottoclaw.bin              "ottoclaw-${VERSION}.bin"
          cp build/bootloader/bootloader.bin "bootloader-${VERSION}.bin"
          cp build/partition_table/partition-table.bin "partition-table-${VERSION}.bin"
          cp build/ota_data_initial.bin      "ota_data_initial-${VERSION}.bin"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Flashing Guide

            ### 1. Merged firmware (easiest)

            Download `ottoclaw-full-${{ github.ref_name }}.bin` and flash with a single command:

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash 0x0 ottoclaw-full-${{ github.ref_name }}.bin
            ```

            ### 2. Individual binaries (advanced)

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash \
              0x0     bootloader-${{ github.ref_name }}.bin \
              0x8000  partition-table-${{ github.ref_name }}.bin \
              0xf000  ota_data_initial-${{ github.ref_name }}.bin \
              0x20000 ottoclaw-${{ github.ref_name }}.bin
            ```

            ### 3. OTA update (for devices already running OttoClaw)

            Upload `ottoclaw-${{ github.ref_name }}.bin` via the OTA endpoint.

            ### 4. First-time setup

            After flashing, connect to the Captive Portal or use serial CLI (115200 baud):

            ```
            set_base_url <your-llm-api-base-url>
            set_api_key <your-api-key>
            set_app_key <dingtalk-app-key>
            set_app_secret <dingtalk-app-secret>
            wifi <ssid> <password>
            reboot
            ```
          files: |
            ottoclaw-full-${{ github.ref_name }}.bin
            ottoclaw-${{ github.ref_name }}.bin
            bootloader-${{ github.ref_name }}.bin
            partition-table-${{ github.ref_name }}.bin
            ota_data_initial-${{ github.ref_name }}.bin