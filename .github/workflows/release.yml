name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Verify no secrets in binary
        shell: bash
        run: |
          BIN="build/ottoclaw.bin"
          echo "Checking for embedded API keys..."
          ! strings "$BIN" | grep -qE 'sk-[a-f0-9]{20,}' || { echo "ERROR: Real API key found in firmware binary!"; exit 1; }
          ! strings "$BIN" | grep -qE 'ding[a-z0-9]{10,}' || { echo "ERROR: DingTalk key found in firmware binary!"; exit 1; }
          echo "Clean — no secrets detected."

      - name: Prepare release artifacts
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"

          # Generate merged firmware for single-command flashing
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode qio \
            --flash_size 16MB \
            --flash_freq 80m \
            -o "ottoclaw-full-${VERSION}.bin" \
            0x0     build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0xf000  build/ota_data_initial.bin \
            0x20000 build/ottoclaw.bin

          # Copy individual binaries with version suffix
          cp build/ottoclaw.bin              "ottoclaw-${VERSION}.bin"
          cp build/bootloader/bootloader.bin "bootloader-${VERSION}.bin"
          cp build/partition_table/partition-table.bin "partition-table-${VERSION}.bin"
          cp build/ota_data_initial.bin      "ota_data_initial-${VERSION}.bin"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## OttoClaw ${{ github.ref_name }}

            ### 烧录方式 / Flashing

            **方式一：在线一键烧录（最简单，推荐新手）**

            1. 下载 `ottoclaw-full-${{ github.ref_name }}.bin`
            2. USB 连接开发板，保持开机状态
            3. 打开 [鹿戴马在线烧录](https://www.16302.com/localinit)，芯片选 ESP系列 > 不限类型
            4. 上传固件文件（写入地址 0x0），点击"开始烧录"
            5. 按一下 EN 键重启设备

            **方式二：esptool 命令行烧录**
            ```bash
            esptool.py --chip esp32s3 --port PORT --baud 460800 --before default_reset --after hard_reset write_flash -z 0x0 ottoclaw-full-${{ github.ref_name }}.bin
            ```
            PORT: `/dev/cu.usbmodem1101` (Mac) / `COM3` (Windows)

            ### 首次配网 / First-time Setup

            烧录完成后设备自动进入配网模式：

            **网页配网（推荐）：** 连接开发板 WiFi（名称 OttoClaw_xxxx），浏览器自动弹出配置页面。

            **串口配网：** 连接串口 (115200 baud)，输入：
            ```
            wifi <SSID> <密码>
            set_base_url <模型API地址>
            set_api_key <你的API-Key>
            set_app_key <钉钉AppKey>
            set_app_secret <钉钉AppSecret>
            reboot
            ```

            ⚠️ 本固件不含任何密钥和个人信息。
          files: |
            ottoclaw-full-${{ github.ref_name }}.bin
            ottoclaw-${{ github.ref_name }}.bin
            bootloader-${{ github.ref_name }}.bin
            partition-table-${{ github.ref_name }}.bin
            ota_data_initial-${{ github.ref_name }}.bin